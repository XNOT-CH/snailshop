services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: mysql://${MYSQL_APP_USER:-app_user}:${MYSQL_APP_PASSWORD}@host.docker.internal:3307/my_game_store
        AUTH_URL: https://www.snailshop.app
        NEXT_PUBLIC_SITE_URL: https://www.snailshop.app
        ALLOWED_ORIGIN: https://www.snailshop.app
        NEXT_PUBLIC_CUBEJS_API_URL: ${NEXT_PUBLIC_CUBEJS_API_URL}
        NEXT_PUBLIC_CUBEJS_API_TOKEN: ${NEXT_PUBLIC_CUBEJS_API_TOKEN}
    container_name: my_game_store_web
    restart: always
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_APP_USER:-app_user}:${MYSQL_APP_PASSWORD}@app_db:3306/my_game_store
      AUTH_URL: https://www.snailshop.app
      NEXT_PUBLIC_SITE_URL: https://www.snailshop.app
      ALLOWED_ORIGIN: https://www.snailshop.app
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./storage:/app/storage
      - ./public/uploads:/app/public/uploads
    depends_on:
      - app_db
    networks:
      - sonarqube-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: my_game_store_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web
    networks:
      - sonarqube-network

  sonarqube:
    image: sonarqube:community
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
    environment:
      # We must use Postgres for SonarQube DB
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    networks:
      - sonarqube-network
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - sonarqube-network

  # Your App Database
  app_db:
    image: mysql:8.0
    container_name: my_game_store_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: my_game_store
      MYSQL_USER: ${MYSQL_APP_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sonarqube-network

  app_db_dev:
    image: mysql:8.0
    container_name: my_game_store_db_dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_DEV_ROOT_PASSWORD:-dev_rootpassword_change_me}
      MYSQL_DATABASE: my_game_store_dev
    ports:
      - "127.0.0.1:3308:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - sonarqube-network

networks:
  sonarqube-network:
    driver: bridge

volumes:
  sonarqube_data:
  postgresql_data:
  mysql_data:
  mysql_dev_data:
