sonar.projectKey=XNOT-CH_snailshop
sonar.organization=xnot-ch
sonar.projectName=My Game Store
sonar.projectVersion=1.0

# Path to source directories (required)
sonar.sources=app,components,lib

# Ignore files that shouldn't be scanned (like UI components, tests, node_modules)
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,.next/**,public/**

# Coverage report path (generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude all UI-only and non-unit-testable files from coverage requirements
sonar.coverage.exclusions=\
  components/**,\
  app/**/page.tsx,\
  app/**/layout.tsx,\
  app/**/loading.tsx,\
  app/**/error.tsx,\
  app/**/global-error.tsx,\
  app/**/not-found.tsx,\
  app/**/template.tsx,\
  components/emails/**,\
  lib/db/**,\
  lib/redis.ts,\
  lib/mail.ts,\
  lib/cubejs.ts,\
  middleware.ts,\
  app/api/gacha/roll/**,\
  app/api/gacha/grid/roll/**,\
  app/api/admin/export/**,\
  app/api/admin/gacha-machines/upload-image/**,\
  app/api/admin/gacha-rewards/upload-image/**,\
  app/api/test-email/**,\
  lib/actions/user.ts,\
  lib/compressImage.ts,\
  lib/imageResize.ts,\
  lib/swal.ts,\
  app/api/upload/**,\
  app/api/topup/**,\
  app/**/*Client.tsx,\
  app/**/*Form.tsx,\
  lib/gachaGrid.ts,\
  lib/sanitize.ts,\
  app/api/cart/**,\
  app/api/purchase/**

# SonarCloud host
sonar.host.url=https://sonarcloud.io

# Pass the token via environment variable instead of committing secrets:
# PowerShell: $env:SONAR_TOKEN="your_token"; npx sonar-scanner
